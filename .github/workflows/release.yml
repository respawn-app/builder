name: release

on:
  workflow_dispatch:
  pull_request:
    types:
      - closed

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'autorelease')) }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      version_bumped: ${{ steps.version.outputs.version_bumped }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}
          token: ${{ secrets.OPENSOURCE_PAT || github.token }}

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Read version
        id: version
        run: |
          git fetch --force --tags origin
          version="$(tr -d ' \n' < VERSION)"
          if [ -z "$version" ]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi
          version="${version#v}"
          if ! [[ "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "VERSION must be a semantic version in X.Y.Z form, got: $version" >&2
            exit 1
          fi
          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          tag="v${version}"

          version_bumped="false"
          while git show-ref --tags --verify --quiet "refs/tags/${tag}"; do
            patch="$((patch + 1))"
            version="${major}.${minor}.${patch}"
            tag="v${version}"
            version_bumped="true"
          done

          if [ "$version_bumped" = "true" ]; then
            printf '%s\n' "$version" > VERSION
            echo "Release tag already existed; bumped VERSION to $version for this release."
          fi

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "version_bumped=$version_bumped"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git tag -a "$TAG" -m "$TAG"
            git push origin "$TAG"
          fi

      - name: Build changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6.1.1
        with:
          commitMode: true
          configuration: ".github/changelog_config.json"

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_VAR: builder/internal/buildinfo.Version
        run: |
          mkdir -p dist
          for GOOS in darwin linux windows; do
            for GOARCH in amd64 arm64; do
              if [ "$GOOS" = "windows" ]; then
                ext=".exe"
              else
                ext=""
              fi
              out="builder_${VERSION}_${GOOS}_${GOARCH}"
              env CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
                go build -ldflags "-X ${VERSION_VAR}=${VERSION}" -o "dist/${out}${ext}" ./cmd/builder
              if [ "$GOOS" = "windows" ]; then
                (cd dist && zip "${out}.zip" "${out}${ext}")
              else
                (cd dist && tar -czf "${out}.tar.gz" "${out}${ext}")
              fi
              rm -f "dist/${out}${ext}"
            done
          done

      - name: Create draft release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: false
          body: ${{ steps.changelog.outputs.changelog }}
          files: dist/*

  update_brew_tap:
    needs: release
    runs-on: ubuntu-latest
    env:
      BREW_FORMULA_NAME: builder-cli
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/checkout@v6.0.2
        with:
          repository: respawn-app/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.RESPAWN_BREW_TAP_TOKEN }}

      - name: Configure git
        run: |
          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update tap formula
        env:
          BUILDER_VERSION: ${{ needs.release.outputs.tag }}
        run: bash scripts/update-brew-tap.sh --tap "$GITHUB_WORKSPACE/homebrew-tap" --formula "$BREW_FORMULA_NAME"

      - name: Ensure pr-pull label exists
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.RESPAWN_BREW_TAP_TOKEN }}
          script: |
            const owner = "respawn-app";
            const repo = "homebrew-tap";
            const name = "pr-pull";
            try {
              await github.rest.issues.getLabel({ owner, repo, name });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                owner,
                repo,
                name,
                color: "0e8a16",
                description: "Ready for brew pr-pull",
              });
            }

      - name: Create tap PR
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          token: ${{ secrets.RESPAWN_BREW_TAP_TOKEN }}
          path: homebrew-tap
          base: master
          branch: chore/${{ env.BREW_FORMULA_NAME }}-${{ needs.release.outputs.tag }}
          commit-message: "${{ env.BREW_FORMULA_NAME }} ${{ needs.release.outputs.tag }}"
          title: "${{ env.BREW_FORMULA_NAME }} ${{ needs.release.outputs.tag }}"
          body: "Automated formula bump for ${{ env.BREW_FORMULA_NAME }} ${{ needs.release.outputs.tag }}."
          labels: pr-pull

  persist_version_bump:
    needs:
      - release
      - update_brew_tap
    if: ${{ needs.release.outputs.version_bumped == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}
          token: ${{ secrets.OPENSOURCE_PAT || github.token }}

      - name: Persist VERSION bump
        env:
          RELEASE_REF: ${{ github.event.pull_request.base.ref || github.ref_name }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          current_version="$(tr -d ' \n' < VERSION)"
          current_version="${current_version#v}"
          if [ "$current_version" = "$RELEASE_VERSION" ]; then
            echo "VERSION already set to $RELEASE_VERSION"
            exit 0
          fi

          printf '%s\n' "$RELEASE_VERSION" > VERSION
          git add VERSION

          if git diff --cached --quiet; then
            echo "No VERSION change to commit"
            exit 0
          fi

          git commit -m "chore: bump version to ${RELEASE_VERSION} [skip ci]"
          git push origin "HEAD:${RELEASE_REF}"
